name: Convert TXT to MRS

on:
  push:
    branches:
      - main
    paths:
      - '*.txt'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download mihomo
        run: |
          set -euo pipefail
          VERSION=$(curl -sL https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/version.txt)
          [ -n "$VERSION" ] || { echo "Error: Failed to fetch mihomo version"; exit 1; }

          echo "Downloading mihomo version: $VERSION"
          curl -sL -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/mihomo-linux-amd64-${VERSION}.gz"
          gzip -d mihomo.gz
          chmod +x mihomo

      - name: Sort and convert files
        run: |
          set -euo pipefail

          SKIP_FILES="processes.txt"

          # return 0 if arg is valid IPv4 or IPv4/CIDR
          is_ipv4_or_cidr() {
            local v="$1"
            awk -v s="$v" -F'[./]' '
              function is_octet(x){ return (x ~ /^[0-9]+$/ && x >= 0 && x <= 255) }
              function is_mask(x){ return (x ~ /^[0-9]+$/ && x >= 0 && x <= 32) }
              BEGIN {
                # a.b.c.d OR a.b.c.d/m
                if (NF!=4 && NF!=5) exit 1
                if (!is_octet($1) || !is_octet($2) || !is_octet($3) || !is_octet($4)) exit 1
                if (NF==5 && !is_mask($5)) exit 1
                exit 0
              }
            ' <<< "$v"
          }

          for txt_file in *.txt; do
            if echo "$SKIP_FILES" | grep -qw "$txt_file"; then
              echo "Skipping $txt_file (classical behavior, no .mrs conversion)"
              continue
            fi
            [ -f "$txt_file" ] || continue

            echo "Processing: $txt_file"
            base_name="${txt_file%.txt}"

            # Keep old domain sorter behavior; don't fail whole job for IP-style files
            python3 .github/scripts/sort_domains.py "$txt_file" || true

            raw_input=$(mktemp)
            norm_input=$(mktemp)
            mrs_input=$(mktemp)

            # 1) Try extractor
            python3 .github/scripts/sort_domains.py --extract "$txt_file" > "$raw_input" || true
            # 2) fallback to raw file if extractor empty
            if [ ! -s "$raw_input" ]; then
              cp "$txt_file" "$raw_input"
            fi

            # Normalize common YAML/text formats
            sed -e 's/\r$//' "$raw_input" \
              | sed -E 's/[[:space:]]+#.*$//' \
              | sed -E '/^[[:space:]]*payload:[[:space:]]*$/Id' \
              | sed -E 's/^[[:space:]]*-[[:space:]]*//' \
              | sed -E 's/^"(.+)"$/\1/' \
              | sed -E "s/^'(.+)'$/\1/" \
              | sed -E 's/^[[:space:]]+|[[:space:]]+$//g' \
              | sed -E '/^[[:space:]]*$/d' \
              > "$norm_input"

            if [ ! -s "$norm_input" ]; then
              echo "Warning: No rules found in $txt_file after normalization"
              rm -f "$raw_input" "$norm_input" "$mrs_input"
              continue
            fi

            # Heuristic detection
            total=$(wc -l < "$norm_input" | tr -d ' ')
            ip_count=$(awk '
              function is_octet(x){ return (x ~ /^[0-9]+$/ && x >= 0 && x <= 255) }
              function is_mask(x){ return (x ~ /^[0-9]+$/ && x >= 0 && x <= 32) }
              BEGIN { c=0 }
              {
                n=split($0,a,/[.\/]/)
                ok=1
                if (n!=4 && n!=5) ok=0
                else {
                  for(i=1;i<=4;i++) if(!is_octet(a[i])) ok=0
                  if(n==5 && !is_mask(a[5])) ok=0
                }
                if(ok) c++
              }
              END { print c }
            ' "$norm_input")

            lower_name=$(echo "$base_name" | tr '[:upper:]' '[:lower:]')

            RULE_TYPE="domain"
            if echo "$lower_name" | grep -Eq '(ipcidr|cidr|(^|[^a-z])ip([^a-z]|$))'; then
              RULE_TYPE="ipcidr"
            else
              # If >=90% lines are valid IP/CIDR -> ipcidr
              if [ "$total" -gt 0 ] && [ $((ip_count * 100 / total)) -ge 90 ]; then
                RULE_TYPE="ipcidr"
              fi
            fi

            # Build final input for mihomo
            if [ "$RULE_TYPE" = "ipcidr" ]; then
              # Keep only valid IPv4/CIDR; add /32 for plain IPv4
              awk '
                function is_octet(x){ return (x ~ /^[0-9]+$/ && x >= 0 && x <= 255) }
                function is_mask(x){ return (x ~ /^[0-9]+$/ && x >= 0 && x <= 32) }
                {
                  n=split($0,a,/[.\/]/)
                  ok=1
                  if (n!=4 && n!=5) ok=0
                  else {
                    for(i=1;i<=4;i++) if(!is_octet(a[i])) ok=0
                    if(n==5 && !is_mask(a[5])) ok=0
                  }
                  if(ok){
                    if(n==4) print $0"/32";
                    else print $0;
                  }
                }
              ' "$norm_input" > "$mrs_input"
            else
              cp "$norm_input" "$mrs_input"
            fi

            if [ ! -s "$mrs_input" ]; then
              echo "Error: No valid rules for ${txt_file} after type filtering (type=${RULE_TYPE})"
              echo "First 20 normalized lines:"
              head -20 "$norm_input" || true
              rm -f "$raw_input" "$norm_input" "$mrs_input"
              exit 1
            fi

            echo "Detected type for $txt_file: $RULE_TYPE (ip_count=${ip_count}, total=${total})"
            echo "Input preview:"
            head -10 "$mrs_input"

            if ! ./mihomo convert-ruleset "$RULE_TYPE" text "$mrs_input" "${base_name}.mrs" 2>&1; then
              echo "Error: Failed conversion for $txt_file"
              echo "Detected type: $RULE_TYPE"
              echo "First 20 normalized lines:"
              head -20 "$norm_input" || true
              echo "First 20 final lines sent to mihomo:"
              head -20 "$mrs_input" || true
              rm -f "$raw_input" "$norm_input" "$mrs_input"
              exit 1
            fi

            [ -f "${base_name}.mrs" ] || { echo "Error: ${base_name}.mrs not created"; rm -f "$raw_input" "$norm_input" "$mrs_input"; exit 1; }

            if [ "$RULE_TYPE" = "ipcidr" ]; then
              size=$(wc -c < "${base_name}.mrs")
              if [ "$size" -lt 100 ]; then
                echo "Error: ${base_name}.mrs too small (${size} bytes) for ipcidr list"
                head -20 "$mrs_input" || true
                rm -f "$raw_input" "$norm_input" "$mrs_input"
                exit 1
              fi
            fi

            echo "Converted: $txt_file -> ${base_name}.mrs ($RULE_TYPE)"
            rm -f "$raw_input" "$norm_input" "$mrs_input"
          done

      - name: Commit changes
        run: |
          set -euo pipefail
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          git add *.txt *.mrs

          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-convert TXT to MRS (robust domain/ipcidr detection)"
            git push
          fi
