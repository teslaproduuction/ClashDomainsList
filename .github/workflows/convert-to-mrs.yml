name: Convert TXT to MRS

on:
  push:
    branches:
      - main
    paths:
      - '*.txt'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download mihomo
        run: |
          # Get the latest alpha version
          VERSION=$(curl -sL https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/version.txt)

          if [ -z "$VERSION" ]; then
            echo "Error: Failed to fetch mihomo version from GitHub releases"
            exit 1
          fi

          echo "Downloading mihomo version: $VERSION"

          # Download and extract mihomo
          curl -sL -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/mihomo-linux-amd64-${VERSION}.gz"
          gzip -d mihomo.gz
          chmod +x mihomo

      - name: Sort and convert files
        run: |
          set -e

          SKIP_FILES="processes.txt"

          for txt_file in *.txt; do
            if echo "$SKIP_FILES" | grep -qw "$txt_file"; then
              echo "Skipping $txt_file (classical behavior, no .mrs conversion)"
              continue
            fi

            [ -f "$txt_file" ] || continue
            echo "Processing: $txt_file"
            base_name="${txt_file%.txt}"

            # Keep old sorter for domain files; don't fail on IP-style files
            python3 .github/scripts/sort_domains.py "$txt_file" || true

            mrs_input=$(mktemp)

            # Try extractor first
            python3 .github/scripts/sort_domains.py --extract "$txt_file" > "$mrs_input" || true

            # Fallback: normalize raw lines
            if [ ! -s "$mrs_input" ]; then
              sed -e 's/\r$//' "$txt_file" \
                | sed -E 's/[[:space:]]+#.*$//' \
                | sed -E 's/^[[:space:]]*-[[:space:]]*//' \
                | sed -E 's/^[[:space:]]+|[[:space:]]+$//g' \
                | sed -E '/^[[:space:]]*$/d' \
                > "$mrs_input"
            else
              # Normalize extractor output too (important for lines like "- 1.2.3.0/24")
              tmp_norm=$(mktemp)
              sed -e 's/\r$//' "$mrs_input" \
                | sed -E 's/[[:space:]]+#.*$//' \
                | sed -E 's/^[[:space:]]*-[[:space:]]*//' \
                | sed -E 's/^[[:space:]]+|[[:space:]]+$//g' \
                | sed -E '/^[[:space:]]*$/d' \
                > "$tmp_norm"
              mv "$tmp_norm" "$mrs_input"
            fi

            if [ ! -s "$mrs_input" ]; then
              echo "Warning: No rules found in $txt_file"
              rm -f "$mrs_input"
              continue
            fi

            # strict IPv4/CIDR validator
            if awk -F'[./]' '
              function is_octet(x){ return (x ~ /^[0-9]+$/ && x >= 0 && x <= 255) }
              function is_mask(x){ return (x ~ /^[0-9]+$/ && x >= 0 && x <= 32) }
              BEGIN { ok=1 }
              {
                # expect a.b.c.d or a.b.c.d/m
                if (NF!=4 && NF!=5) { ok=0; exit }
                if (!is_octet($1) || !is_octet($2) || !is_octet($3) || !is_octet($4)) { ok=0; exit }
                if (NF==5 && !is_mask($5)) { ok=0; exit }
              }
              END { exit(ok?0:1) }
            ' "$mrs_input"; then
              RULE_TYPE="ipcidr"
            else
              RULE_TYPE="domain"
            fi

            echo "Detected rules type for ${txt_file}: ${RULE_TYPE}"
            echo "Input sample:"
            head -10 "$mrs_input"

            if ! ./mihomo convert-ruleset "${RULE_TYPE}" text "$mrs_input" "${base_name}.mrs" 2>&1; then
              echo "Error: Failed to convert $txt_file to mrs format"
              echo "Detected type: ${RULE_TYPE}"
              head -20 "$mrs_input"
              rm -f "$mrs_input"
              exit 1
            fi

            if [ ! -f "${base_name}.mrs" ]; then
              echo "Error: Output file ${base_name}.mrs was not created"
              rm -f "$mrs_input"
              exit 1
            fi

            # Guardrail: tiny ipcidr .mrs usually means bad parse/empty effective input
            if [ "${RULE_TYPE}" = "ipcidr" ]; then
              size=$(wc -c < "${base_name}.mrs")
              if [ "$size" -lt 100 ]; then
                echo "Error: ${base_name}.mrs is suspiciously small (${size} bytes) for ipcidr input"
                echo "First 20 normalized input lines:"
                head -20 "$mrs_input"
                rm -f "$mrs_input"
                exit 1
              fi
            fi

            echo "Converted: $txt_file -> ${base_name}.mrs (${RULE_TYPE})"
            rm -f "$mrs_input"
          done

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Add all changes
          git add *.txt *.mrs

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-sort rules and update .mrs files (domain/ipcidr)"
            git push
          fi
