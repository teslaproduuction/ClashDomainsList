name: Convert TXT to MRS

on:
  push:
    branches:
      - main
    paths:
      - '*.txt'
  workflow_dispatch:

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download mihomo
        run: |
          # Get the latest alpha version
          VERSION=$(curl -sL https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/version.txt)

          if [ -z "$VERSION" ]; then
            echo "Error: Failed to fetch mihomo version from GitHub releases"
            exit 1
          fi

          echo "Downloading mihomo version: $VERSION"

          # Download and extract mihomo
          curl -sL -o mihomo.gz "https://github.com/MetaCubeX/mihomo/releases/download/Prerelease-Alpha/mihomo-linux-amd64-${VERSION}.gz"
          gzip -d mihomo.gz
          chmod +x mihomo

      - name: Sort and convert files
        run: |
          set -e  # Exit on error

          # Process each txt file (skip classical behavior files)
          SKIP_FILES="processes.txt"

          for txt_file in *.txt; do
            if echo "$SKIP_FILES" | grep -qw "$txt_file"; then
              echo "Skipping $txt_file (classical behavior, no .mrs conversion)"
              continue
            fi

            [ -f "$txt_file" ] || continue
            echo "Processing: $txt_file"

            # Get base name (without extension)
            base_name="${txt_file%.txt}"

            # Keep existing sort behavior (for domain lists)
            python3 .github/scripts/sort_domains.py "$txt_file" || true

            # Build input for mihomo
            mrs_input=$(mktemp)

            # 1) Try existing extractor first
            python3 .github/scripts/sort_domains.py --extract "$txt_file" > "$mrs_input" || true

            # 2) Fallback for raw IP/CIDR or plain text lists
            if [ ! -s "$mrs_input" ]; then
              echo "Extractor returned empty for $txt_file, using raw lines fallback"
              sed -e 's/\r$//' "$txt_file" \
                | sed -E 's/[[:space:]]+#.*$//' \
                | sed -E '/^[[:space:]]*$/d' \
                > "$mrs_input"
            fi

            # Check again
            if [ ! -s "$mrs_input" ]; then
              echo "Warning: No rules found in $txt_file"
              rm -f "$mrs_input"
              continue
            fi

            # Detect rule type: ipcidr if every line is IPv4[/mask], else domain
            if awk '
              BEGIN { ok=1 }
              /^[[:space:]]*($|#)/ { next }
              !/^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+(\/([0-9]|[1-2][0-9]|3[0-2]))?$/ { ok=0; exit }
              END { exit(ok?0:1) }
            ' "$mrs_input"; then
              RULE_TYPE="ipcidr"
            else
              RULE_TYPE="domain"
            fi

            echo "Detected rules type for ${txt_file}: ${RULE_TYPE}"

            if ! ./mihomo convert-ruleset "${RULE_TYPE}" text "$mrs_input" "${base_name}.mrs" 2>&1; then
              echo "Error: Failed to convert $txt_file to mrs format"
              echo "Detected type: ${RULE_TYPE}"
              echo "Input file content (first 20 lines):"
              head -20 "$mrs_input"
              rm -f "$mrs_input"
              exit 1
            fi

            if [ ! -f "${base_name}.mrs" ]; then
              echo "Error: Output file ${base_name}.mrs was not created"
              rm -f "$mrs_input"
              exit 1
            fi

            echo "Converted: $txt_file -> ${base_name}.mrs (${RULE_TYPE})"
            rm -f "$mrs_input"
          done

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

          # Add all changes
          git add *.txt *.mrs

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-sort rules and update .mrs files (domain/ipcidr)"
            git push
          fi
